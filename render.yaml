services:
  - type: web
    name: must-odoo-hr-tracker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_DIR
        value: /var/data
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
