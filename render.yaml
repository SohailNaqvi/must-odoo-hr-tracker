databases:
  - name: must-tracker-db
    plan: basic-256mb          # any paid PG plan; basic-256mb is the cheapest
    databaseName: must_tracker
    user: must_tracker

services:
  - type: web
    name: must-odoo-hr-tracker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: must-tracker-db
          property: connectionString
